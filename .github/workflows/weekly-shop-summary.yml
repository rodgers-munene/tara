name: Weekly shop summary email

on:
  schedule:
    # 05:00 UTC Sunday = 08:00 EAT Sunday
    - cron: "0 5 * * 0"
  workflow_dispatch: {}

jobs:
  ping-cron-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly summary
        run: |
          curl -sf -X POST "${BACKEND_URL}/cron/weekly-summary" \
            -H "X-Cron-Secret: ${CRON_SECRET}"
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
